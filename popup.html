<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JobTrack</title>
  <style>
    :root {
      --blue:       #3b6ff5;
      --blue-dark:  #2955d0;
      --blue-light: #eef2ff;
      --green:      #22c55e;
      --red:        #ef4444;
      --amber:      #f59e0b;
      --purple:     #8b5cf6;
      --surface:    #ffffff;
      --bg:         #f5f7ff;
      --border:     #e4e8f0;
      --text-1:     #0d1526;
      --text-2:     #4a5568;
      --text-3:     #94a3b8;
      --radius:     12px;
      --shadow-sm:  0 1px 3px rgba(0,0,0,.08);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 340px;
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: var(--text-1);
      line-height: 1.5;
    }

    /* ── SETTINGS DRAWER ── */
    .settings-drawer {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.25s ease, opacity 0.2s ease;
      opacity: 0;
    }
    .settings-drawer.open { max-height: 220px; opacity: 1; }
    .settings-inner { padding: 14px 16px 16px; }
    .settings-title { font-size: 12px; font-weight: 700; text-transform: uppercase;
                      letter-spacing: 0.6px; color: var(--text-2); margin-bottom: 12px; }
    .form-label { display: block; font-size: 11px; font-weight: 600; color: var(--text-2);
                  margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.4px; }
    .form-input {
      width: 100%; padding: 9px 11px; border: 1.5px solid var(--border);
      border-radius: 8px; font-size: 12.5px; color: var(--text-1);
      background: var(--bg); outline: none; font-family: inherit;
      transition: border-color .15s, box-shadow .15s;
    }
    .form-input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(59,111,245,.12); background:#fff; }
    .form-input::placeholder { color: var(--text-3); }
    .form-hint { font-size: 11px; color: var(--text-3); margin-top: 4px; margin-bottom: 10px; }
    .form-hint code { background:#f1f5f9; border-radius:3px; padding:0 4px; font-size:10.5px; color:var(--blue); }
    .btn-save { width:100%; padding:9px; background:var(--green); color:#fff; border:none;
                border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; transition:background .15s; }
    .btn-save:hover { background:#16a34a; }
    .save-msg { text-align:center; font-size:12px; font-weight:500; color:var(--green);
                margin-top:6px; min-height:18px; }
    .save-msg.error { color:var(--red); }

    /* ── HEADER ── */
    .header {
      background: linear-gradient(135deg, #3b6ff5, #2146c7);
      padding: 14px 16px 13px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .brand { display:flex; align-items:center; gap:9px; }
    .brand-mark {
      width:32px; height:32px; background:rgba(255,255,255,.18);
      border:1.5px solid rgba(255,255,255,.3); border-radius:9px;
      display:flex; align-items:center; justify-content:center;
      font-weight:900; font-size:12px; color:#fff; letter-spacing:-0.5px;
    }
    .brand-name { font-size:17px; font-weight:700; color:#fff; letter-spacing:-0.3px; }
    .brand-tag  { font-size:10px; color:rgba(255,255,255,.65); }
    .icon-btn {
      width:30px; height:30px; background:rgba(255,255,255,.15);
      border:1.5px solid rgba(255,255,255,.2); border-radius:8px;
      color:rgba(255,255,255,.9); cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      transition:background .15s; flex-shrink:0;
    }
    .icon-btn:hover, .icon-btn.active { background:rgba(255,255,255,.28); color:#fff; }

    /* ── STALE BANNER ── */
    .stale-banner {
      display:none; align-items:center; gap:8px;
      background:#fff7ed; border-bottom:1px solid #fed7aa;
      padding:8px 14px; font-size:12px; color:#92400e;
    }
    .stale-banner.visible { display:flex; }
    .stale-dot { width:7px; height:7px; border-radius:50%; background:#f97316; flex-shrink:0; }

    /* ── STATS ── */
    .stats { display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:14px 14px 0; }
    .stat-card {
      background:var(--surface); border:1px solid var(--border);
      border-radius:var(--radius); padding:14px 16px;
      box-shadow:var(--shadow-sm); position:relative; overflow:hidden;
    }
    .stat-card::before {
      content:""; position:absolute; top:0; left:0; right:0; height:3px;
      background:var(--blue); border-radius:var(--radius) var(--radius) 0 0;
    }
    .stat-card.total::before { background:linear-gradient(90deg,#8b5cf6,#6366f1); }
    .stat-value { font-size:34px; font-weight:800; color:var(--blue); line-height:1; letter-spacing:-1px; }
    .stat-card.total .stat-value { color:#7c3aed; }
    .stat-label { font-size:11px; color:var(--text-3); margin-top:5px;
                  text-transform:uppercase; letter-spacing:0.6px; font-weight:600; }
    .stat-sub { font-size:11px; color:var(--text-3); margin-top:1px; }

    /* ── SECTION HEADER ── */
    .section-header { display:flex; align-items:center; justify-content:space-between; padding:14px 14px 8px; }
    .section-title  { font-size:11px; font-weight:700; text-transform:uppercase;
                      letter-spacing:0.7px; color:var(--text-3); }

    /* ── APP LIST ── */
    .app-list { list-style:none; padding:0 8px; display:flex; flex-direction:column; gap:6px; }

    .app-item {
      background:var(--surface); border:1px solid var(--border);
      border-radius:10px; padding:10px 12px; box-shadow:var(--shadow-sm);
      transition:border-color .15s, box-shadow .15s;
    }
    .app-item:hover { border-color:#c7d2fe; box-shadow:0 2px 8px rgba(59,111,245,.10); }

    .app-row1 { display:flex; align-items:flex-start; justify-content:space-between; gap:8px; margin-bottom:4px; }
    .app-title { font-weight:600; font-size:13px; color:var(--text-1);
                 white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex:1; }
    .app-date  { font-size:11px; color:var(--text-3); white-space:nowrap; flex-shrink:0; }

    .app-row2 { display:flex; align-items:center; gap:6px; justify-content:space-between; }
    .app-left  { display:flex; align-items:center; gap:6px; min-width:0; }
    .app-company { font-size:12px; color:var(--text-2); white-space:nowrap;
                   overflow:hidden; text-overflow:ellipsis; }
    .site-chip {
      display:inline-flex; background:var(--blue-light); color:var(--blue);
      font-size:10px; font-weight:600; padding:2px 7px; border-radius:99px;
      white-space:nowrap; flex-shrink:0; border:1px solid #bfdbfe;
    }

    /* ── STATUS BADGE ── */
    .status-badge {
      display:inline-flex; align-items:center; gap:3px;
      font-size:10px; font-weight:700; padding:3px 8px; border-radius:99px;
      cursor:pointer; border:1.5px solid transparent;
      transition:opacity .15s, transform .1s; white-space:nowrap; flex-shrink:0;
      user-select:none;
    }
    .status-badge:hover  { opacity:.82; }
    .status-badge:active { transform:scale(.95); }

    .status-badge[data-status="Applied"]      { background:#eff6ff; color:#2563eb; border-color:#bfdbfe; }
    .status-badge[data-status="Phone Screen"] { background:#f5f3ff; color:#7c3aed; border-color:#ddd6fe; }
    .status-badge[data-status="Interview"]    { background:#fffbeb; color:#b45309; border-color:#fde68a; }
    .status-badge[data-status="Offer"]        { background:#f0fdf4; color:#15803d; border-color:#bbf7d0; }
    .status-badge[data-status="Rejected"]     { background:#fef2f2; color:#b91c1c; border-color:#fecaca; }

    .status-badge .spin { display:none; }
    .status-badge.loading .spin { display:inline; animation:spin .6s linear infinite; }
    .status-badge.loading .label { visibility:hidden; }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* ── NOTES ── */
    .app-notes {
      margin-top:6px; font-size:11px; color:var(--text-3);
      font-style:italic; padding-top:6px; border-top:1px solid var(--border);
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }

    /* ── AI FIELDS ── */
    .app-brief {
      margin-top:5px; font-size:11.5px; color:var(--text-2);
      line-height:1.5; display:-webkit-box; -webkit-line-clamp:2;
      -webkit-box-orient:vertical; overflow:hidden;
    }

    .app-ai-row {
      display:flex; flex-wrap:wrap; gap:4px; margin-top:6px;
      padding-top:6px; border-top:1px solid var(--border);
    }

    .yoe-chip {
      display:inline-flex; align-items:center; gap:3px;
      font-size:10px; font-weight:600; padding:2px 7px; border-radius:99px;
      background:#fef9c3; color:#854d0e; border:1px solid #fde047;
      white-space:nowrap;
    }

    .skill-chip {
      display:inline-flex; font-size:10px; font-weight:500;
      padding:2px 7px; border-radius:99px;
      background:#f0fdf4; color:#166534; border:1px solid #bbf7d0;
      white-space:nowrap;
    }

    .ai-analyzing {
      font-size:10.5px; color:var(--text-3); font-style:italic;
      display:flex; align-items:center; gap:4px; margin-top:4px;
    }
    .ai-analyzing .dot { animation: pulse 1.2s ease-in-out infinite; }
    .ai-analyzing .dot:nth-child(2) { animation-delay:.2s; }
    .ai-analyzing .dot:nth-child(3) { animation-delay:.4s; }
    @keyframes pulse { 0%,80%,100% { opacity:.3 } 40% { opacity:1 } }

    /* ── EMPTY STATE ── */
    .empty-state {
      background:var(--surface); border:1.5px dashed var(--border);
      border-radius:var(--radius); padding:24px 20px; text-align:center; margin:0 6px;
    }
    .empty-icon  { font-size:28px; margin-bottom:8px; opacity:.4; }
    .empty-title { font-weight:600; color:var(--text-2); font-size:13px; margin-bottom:4px; }
    .empty-hint  { font-size:12px; color:var(--text-3); }
    .empty-hint kbd {
      background:#f1f5f9; border:1px solid #cbd5e1; border-bottom-width:2px;
      border-radius:5px; padding:1px 6px; font-family:monospace; font-size:10px; color:#475569;
    }

    /* ── FOOTER ── */
    .footer { padding:12px 8px 12px; }
    .btn-primary {
      width:100%; padding:11px; background:var(--blue); color:#fff; border:none;
      border-radius:10px; font-size:13px; font-weight:600; cursor:pointer;
      display:flex; align-items:center; justify-content:center; gap:7px;
      transition:background .15s, transform .1s, box-shadow .15s;
      box-shadow:0 2px 8px rgba(59,111,245,.35); letter-spacing:0.1px;
    }
    .btn-primary:hover { background:var(--blue-dark); transform:translateY(-1px);
                         box-shadow:0 4px 14px rgba(59,111,245,.45); }
    .btn-primary:active { transform:translateY(0); }
    .btn-primary:disabled { background:#a5b4fc; box-shadow:none; cursor:default; transform:none; }

    .divider { height:1px; background:var(--border); margin:4px 0 0; }

    /* ── SHORTCUT HINT ── */
    .shortcut-hint {
      text-align:center; font-size:11px; color:var(--text-3);
      padding:8px 14px 12px; display:flex; align-items:center; justify-content:center; gap:5px;
    }
    .shortcut-hint kbd {
      background:#f1f5f9; border:1px solid #cbd5e1; border-bottom-width:2px;
      border-radius:5px; padding:1px 6px; font-family:monospace; font-size:10px; color:#475569;
    }
  </style>
</head>
<body>

  <!-- Settings drawer -->
  <div class="settings-drawer" id="settingsDrawer">
    <div class="settings-inner">
      <div class="settings-title">Settings</div>
      <label class="form-label" for="sheetIdInput">Google Sheet ID</label>
      <input class="form-input" type="text" id="sheetIdInput"
             placeholder="Paste your Sheet ID or full URL…" autocomplete="off" spellcheck="false"/>
      <div class="form-hint">From your Sheet URL: /spreadsheets/d/<code>SHEET_ID</code>/edit</div>
      <button class="btn-save" id="saveSettingsBtn">Save Settings</button>
      <div class="save-msg" id="saveMsg"></div>
    </div>
  </div>

  <!-- Header -->
  <div class="header">
    <div class="brand">
      <div class="brand-mark">JT</div>
      <div>
        <div class="brand-name">JobTrack</div>
        <div class="brand-tag">Application Tracker</div>
      </div>
    </div>
    <button class="icon-btn" id="gearBtn" title="Settings">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65
                 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65
                 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65
                 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0
                 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65
                 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0
                 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65
                 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0
                 0 0-1.51 1z"/>
      </svg>
    </button>
  </div>

  <!-- Stale follow-up banner -->
  <div class="stale-banner" id="staleBanner">
    <div class="stale-dot"></div>
    <span id="staleText"></span>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat-card today">
      <div class="stat-value" id="todayCount">0</div>
      <div class="stat-label">Today</div>
      <div class="stat-sub" id="todayDate"></div>
    </div>
    <div class="stat-card total">
      <div class="stat-value" id="totalCount">0</div>
      <div class="stat-label">All-time</div>
      <div class="stat-sub">applications</div>
    </div>
  </div>

  <!-- Recent list -->
  <div class="section-header">
    <span class="section-title">Recent Applications</span>
  </div>
  <ul class="app-list" id="appList"></ul>

  <div class="divider"></div>

  <!-- Footer -->
  <div class="footer">
    <button class="btn-primary" id="openSheetBtn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
        <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
      </svg>
      Open Google Sheet
    </button>
  </div>

  <div class="shortcut-hint">
    <kbd>Ctrl+Shift+X</kbd> <span style="color:#cbd5e1">/</span>
    <kbd>⌘ Shift X</kbd> <span>to log a job</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
